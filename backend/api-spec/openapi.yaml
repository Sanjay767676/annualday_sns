openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Dynamic Form System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: faculty
    description: Faculty form submissions
  - name: student
    description: Student form submissions
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /faculty:
    post:
      operationId: submitFacultyForm
      tags: [faculty]
      summary: Submit faculty form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FacultyFormData"
      responses:
        "201":
          description: Faculty form submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /student:
    post:
      operationId: submitStudentForm
      tags: [student]
      summary: Submit student form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentFormData"
      responses:
        "201":
          description: Student form submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/faculty:
    get:
      operationId: getAllFacultySubmissions
      tags: [admin]
      summary: Get paginated filtered faculty data
      security:
        - AdminToken: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [paper, book, patent, phd]
            default: paper
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Paginated faculty section data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedDataResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/student:
    get:
      operationId: getAllStudentSubmissions
      tags: [admin]
      summary: Get paginated filtered student data
      security:
        - AdminToken: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [firstRank, semesterWise, achievement, reputedInstitution]
            default: firstRank
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Paginated student section data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedDataResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get submission statistics
      security:
        - AdminToken: []
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    AdminToken:
      type: apiKey
      in: header
      name: x-admin-token

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SubmissionResponse:
      type: object
      properties:
        id:
          type: string
        message:
          type: string
      required:
        - id
        - message

    AdminLoginRequest:
      type: object
      properties:
        password:
          type: string
      required:
        - password

    AdminLoginResponse:
      type: object
      properties:
        token:
          type: string
        message:
          type: string
      required:
        - token
        - message

    PaginatedDataResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: {}
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - data
        - total
        - page
        - limit

    AdminStats:
      type: object
      properties:
        totalFacultySubmissions:
          type: number
        totalStudentSubmissions:
          type: number
        recentFacultySubmissions:
          type: number
        recentStudentSubmissions:
          type: number
      required:
        - totalFacultySubmissions
        - totalStudentSubmissions
        - recentFacultySubmissions
        - recentStudentSubmissions

    PaperPublished:
      type: object
      properties:
        facultyName:
          type: string
        designation:
          type: string
        department:
          type: string
        titleOfPaper:
          type: string
        journalType:
          type: string
          enum: [Scopus, SCI, WOS, Annexure-1]
        monthYear:
          type: string
      required:
        - facultyName
        - designation
        - department
        - titleOfPaper
        - journalType
        - monthYear

    BookChapter:
      type: object
      properties:
        name:
          type: string
        designation:
          type: string
        department:
          type: string
        titleOfBook:
          type: string
        publisherIsbn:
          type: string
        monthYear:
          type: string
      required:
        - name
        - designation
        - department
        - titleOfBook
        - publisherIsbn
        - monthYear

    PatentGranted:
      type: object
      properties:
        name:
          type: string
        designation:
          type: string
        department:
          type: string
        titleOfPatent:
          type: string
        designProduct:
          type: string
        monthYear:
          type: string
      required:
        - name
        - designation
        - department
        - titleOfPatent
        - designProduct
        - monthYear

    FirstRankHolder:
      type: object
      properties:
        studentName:
          type: string
        yearOfStudy:
          type: string
        ugPg:
          type: string
          enum: [UG, PG]
        department:
          type: string
        regNumber:
          type: string
        percentageSecured:
          type: string
      required:
        - studentName
        - yearOfStudy
        - ugPg
        - department
        - regNumber
        - percentageSecured

    SemesterWiseRanker:
      type: object
      properties:
        studentName:
          type: string
        department:
          type: string
        yearOfStudy:
          type: string
        ugPg:
          type: string
          enum: [UG, PG]
        sgpa:
          type: string
      required:
        - studentName
        - department
        - yearOfStudy
        - ugPg
        - sgpa

    StudentAchievement:
      type: object
      properties:
        studentName:
          type: string
        department:
          type: string
        yearOfStudy:
          type: string
        achievementDetails:
          type: string
      required:
        - studentName
        - department
        - yearOfStudy
        - achievementDetails

    ReputedInstitutionAchievement:
      type: object
      properties:
        studentName:
          type: string
        department:
          type: string
        yearOfStudy:
          type: string
        eventType:
          type: string
          enum: [Hackathon, Patent Published, Paper Published, E-Kart, Go J Kart]
        paperType:
          type: string
          enum: [SCI, WOS, Scopus, Annexure-1]
        designProduct:
          type: string
          enum: [Design, Product]
        dateOfPublished:
          type: string
        institutionIndustry:
          type: string
          enum: [Tire 1 College, Tire 2 College, MNCs, Mango Big 7, Startup]
        institutionName:
          type: string
        prizeWon:
          type: string
          enum: [Winner, Runner]
        proofLink:
          type: string
        journalName:
          type: string
        isbn:
          type: string
        numberOfAuthors:
          type: string
        author1:
          type: string
        author2:
          type: string
        author3:
          type: string
        author4:
          type: string
        author5:
          type: string
      required:
        - studentName
        - department
        - yearOfStudy
        - eventType

    PhDAwardee:
      type: object
      properties:
        name:
          type: string
        designation:
          type: string
        branch:
          type: string
        university:
          type: string
        year:
          type: string
        title:
          type: string
      required:
        - name
        - designation
        - branch
        - university
        - year
        - title

    FacultyFormData:
      type: object
      properties:
        papersPublished:
          type: array
          items:
            $ref: "#/components/schemas/PaperPublished"
        booksChapters:
          type: array
          items:
            $ref: "#/components/schemas/BookChapter"
        patentsGranted:
          type: array
          items:
            $ref: "#/components/schemas/PatentGranted"
        phdAwardees:
          type: array
          items:
            $ref: "#/components/schemas/PhDAwardee"
      required:
        - papersPublished
        - booksChapters
        - patentsGranted
        - phdAwardees

    StudentFormData:
      type: object
      properties:
        firstRankHolders:
          type: array
          items:
            $ref: "#/components/schemas/FirstRankHolder"
        semesterWiseRankers:
          type: array
          items:
            $ref: "#/components/schemas/SemesterWiseRanker"
        reputedInstitutionAchievements:
          type: array
          items:
            $ref: "#/components/schemas/ReputedInstitutionAchievement"
      required:
        - firstRankHolders
        - semesterWiseRankers
        - reputedInstitutionAchievements

    FacultySubmission:
      type: object
      properties:
        id:
          type: string
        data:
          $ref: "#/components/schemas/FacultyFormData"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - data
        - createdAt

    StudentSubmission:
      type: object
      properties:
        id:
          type: string
        data:
          $ref: "#/components/schemas/StudentFormData"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - data
        - createdAt
